<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MikroTik SaaS - منصة إدارة أجهزة MikroTik الاحترافية">
  <title>MikroTik SaaS - تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #00d4ff;
      --primary-dark: #0099cc;
      --secondary: #7c3aed;
      --bg-dark: #0a0e1a;
      --bg-card: rgba(255,255,255,0.05);
      --text-primary: #ffffff;
      --text-muted: #8892a4;
      --success: #10b981;
      --error: #ef4444;
      --border: rgba(255,255,255,0.1);
      --glow: 0 0 30px rgba(0,212,255,0.3);
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 90%, rgba(16,185,129,0.08) 0%, transparent 60%);
    }

    .grid-lines {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: 
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: float linear infinite;
      z-index: 0;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: rgba(15, 20, 40, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), var(--glow);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
      box-shadow: 0 0 30px rgba(0,212,255,0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(0,212,255,0.4); }
      50% { box-shadow: 0 0 50px rgba(0,212,255,0.7); }
    }

    .logo-title {
      font-size: 24px;
      font-weight: 900;
      color: var(--text-primary);
      letter-spacing: 1px;
    }

    .logo-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 14px 44px 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
      direction: ltr;
      text-align: left;
    }

    input:focus {
      border-color: var(--primary);
      background: rgba(0,212,255,0.05);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }

    input::placeholder { color: rgba(255,255,255,0.2); }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.4s;
    }

    .btn-login:hover::before { left: 100%; }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,212,255,0.4);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .alert.error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .alert.success {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7;
    }

    .footer-info {
      text-align: center;
      margin-top: 28px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .footer-info span {
      color: var(--primary);
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--primary);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="bg-animated"></div>
  <div class="grid-lines"></div>

  <!-- Particles will be added by JS -->

  <div class="login-container">
    <div class="login-card">
      <div class="logo-section">
        <div class="logo-icon">🔌</div>
        <div class="logo-title">MikroTik SaaS</div>
        <div class="logo-subtitle">منصة إدارة الشبكات الاحترافية</div>
        <div class="version-badge">⚡ v1.0.0 Enterprise</div>
      </div>

      <div id="alert" class="alert"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>اسم المستخدم</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input 
              id="username" 
              type="text" 
              placeholder="admin"
              autocomplete="username"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label>كلمة المرور</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input 
              id="password" 
              type="password" 
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
          </div>
        </div>

        <button id="loginBtn" class="btn-login" type="submit">
          <span id="btnText">تسجيل الدخول</span>
        </button>
      </form>

      <div class="footer-info">
        بيانات الدخول الافتراضية: <span>admin</span> / <span>admin123</span>
      </div>
    </div>
  </div>

  <script>
    // Create floating particles
    function createParticles() {
      const colors = ['#00d4ff', '#7c3aed', '#10b981'];
      for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 4 + 2;
        particle.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          opacity: 0.4;
          left: ${Math.random() * 100}%;
          animation-duration: ${Math.random() * 15 + 10}s;
          animation-delay: ${Math.random() * 10}s;
        `;
        document.body.appendChild(particle);
      }
    }

    createParticles();

    // Check if already logged in
    const token = localStorage.getItem('mt_token');
    if (token) {
      fetch('/api/auth/verify', {
        headers: { 'Authorization': `Bearer ${token}` }
      }).then(r => r.json()).then(data => {
        if (data.success) window.location.href = '/dashboard';
      }).catch(() => localStorage.removeItem('mt_token'));
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');
      const alert = document.getElementById('alert');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Show loading
      btn.disabled = true;
      btnText.innerHTML = 'جاري تسجيل الدخول <span class="spinner"></span>';
      alert.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('mt_token', data.token);
          localStorage.setItem('mt_user', JSON.stringify(data.user));
          
          alert.className = 'alert success';
          alert.innerHTML = '✅ تم تسجيل الدخول بنجاح، جاري التحويل...';
          alert.style.display = 'flex';

          setTimeout(() => window.location.href = '/dashboard', 800);
        } else {
          throw new Error(data.message || 'خطأ في تسجيل الدخول');
        }
      } catch (err) {
        alert.className = 'alert error';
        alert.innerHTML = '❌ ' + (err.message || 'خطأ في الاتصال بالخادم');
        alert.style.display = 'flex';
        btn.disabled = false;
        btnText.textContent = 'تسجيل الدخول';
      }
    }
  </script>
</body>
</html>
